<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ディアボロ">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>ディアボロの大冒険</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
      touch-action: none;
    }

    #app, #game-wrap {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas#c0 {
      display: block !important;
      position: fixed !important;
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) !important;
      width: 100vh !important;
      height: 100vh !important;
      width: 100dvh !important;
      height: 100dvh !important;
      max-width: none !important;
      max-height: none !important;
      margin: 0 !important;
      padding: 0 !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #pad, #extra, #reset_data, #debug_data, #bgmlink {
      display: none !important;
    }

    #bgm {
      position: fixed !important;
      left: 0 !important;
      bottom: 0 !important;
      width: 2px !important;
      height: 2px !important;
      opacity: 0.01 !important;
      border: 0 !important;
      pointer-events: none !important;
      display: block !important;
    }

    #audio-start {
      position: fixed;
      inset: 0;
      z-index: 9999;
      width: 100%;
      height: 100%;
      border: 0;
      background: rgba(0,0,0,.56);
      color: #fff;
      font: 700 18px sans-serif;
    }
  </style>
</head>
<body>
  <button id="audio-start" type="button" hidden>タップしてBGMを開始</button>
  <main id="app">
    <div id="game-wrap">
      <canvas id="c0"></canvas>
    </div>

    <div id="pad">
      <button id="83">S/射撃</button>
      <button id="67">C/方向</button>
      <button id="88">X/キャンセル</button>
      <button id="32">Sp/地図</button>
      <button id="65">A/メニュー</button>
      <button id="90">Z/攻撃/選択</button>
      <button id="XH" hidden>X(Hold)</button>

      <div id="extra">
        BGMのYouTubeリンク（広告と音量に注意）：
        <iframe id="bgm" width="2" height="2" src="" frameborder="0" allow="autoplay; encrypted-media" playsinline></iframe>
        <a id="bgmlink" href="" target="_blank" rel="noopener">YouTube</a>
      </div>

      <button id="reset_data">データ消去</button>
      <button id="debug_data">デバッグ：攻略済みにする</button>
    </div>
  </main>

  <script src="classes.js"></script>
  <script src="adapter.js"></script>
  <script src="controller.js"></script>
  <script src="func0.js"></script>
  <script src="func1.js"></script>
  <script src="func2.js"></script>
  <script src="func3.js"></script>
  <script src="func4.js"></script>
  <script src="func5.js"></script>
  <script src="func6.js"></script>
  <script src="func7.js"></script>
  <script src="func8.js"></script>
  <script src="func9.js"></script>
  <script src="main.js"></script>

  <script>
    (function () {
      const start = document.getElementById("audio-start");
      const iframe = document.getElementById("bgm");
      let bgmReady = false;

      if (iframe && iframe.parentElement !== document.body) {
        document.body.appendChild(iframe);
      }

      function resizeGame() {
        const canvas = document.getElementById("c0");
        if (!canvas) return;

        const viewportHeight = window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;

        const screenHeight = window.screen && window.screen.height
          ? window.screen.height
          : viewportHeight;

        /*
          iPhone横画面で visualViewport が半分程度になる場合を避け、
          利用可能な高さの最大値を採用する。
        */
        const availableHeight = Math.max(
          window.innerHeight || 0,
          viewportHeight || 0,
          screenHeight || 0
        );

        const availableWidth = Math.max(
          document.documentElement.clientWidth || 0,
          window.innerWidth || 0
        );

        const size = Math.floor(Math.min(availableWidth, availableHeight));

        canvas.style.setProperty("width", size + "px", "important");
        canvas.style.setProperty("height", size + "px", "important");
        canvas.style.setProperty("left", "50%", "important");
        canvas.style.setProperty("top", "50%", "important");
        canvas.style.setProperty(
          "transform",
          "translate(-50%, -50%)",
          "important"
        );
      }

      function postPlay() {
        if (!iframe || !iframe.contentWindow) return;
        try {
          iframe.contentWindow.postMessage(
            JSON.stringify({
              event: "command",
              func: "playVideo",
              args: []
            }),
            "*"
          );
        } catch (_) {}
      }

      async function unlockSoundEffects() {
        if (typeof se === "undefined" || !se) return;

        for (let i = 0; i < se.length; i++) {
          const audio = se[i];
          if (!audio || typeof audio.play !== "function") continue;

          try {
            const oldMuted = audio.muted;
            const oldVolume = audio.volume;
            audio.muted = true;
            audio.volume = 0;

            const result = audio.play();
            if (result && typeof result.then === "function") {
              await result.catch(function () {});
            }

            audio.pause();
            audio.currentTime = 0;
            audio.muted = oldMuted;
            audio.volume = oldVolume;
          } catch (_) {}
        }
      }

      window.diavoloBgmReady = function () {
        bgmReady = true;
        start.hidden = false;

        iframe.addEventListener("load", function () {
          if (start.hidden) {
            setTimeout(postPlay, 150);
          }
        }, { once: true });
      };

      start.addEventListener("click", async function () {
        await unlockSoundEffects();

        start.hidden = true;
        postPlay();
        setTimeout(postPlay, 350);
        setTimeout(postPlay, 900);
        setTimeout(postPlay, 1600);
      });

      resizeGame();
      window.addEventListener("resize", resizeGame);
      window.addEventListener("orientationchange", function () {
        setTimeout(resizeGame, 100);
        setTimeout(resizeGame, 500);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resizeGame);
      }

      /*
        キャッシュされたBGM URLが既に入っている場合にもボタンを出す。
      */
      window.addEventListener("load", function () {
        resizeGame();
        if (iframe && iframe.src && iframe.src.indexOf("/embed/") !== -1) {
          window.diavoloBgmReady();
        }
      });
    })();
  </script>

</body>
</html>

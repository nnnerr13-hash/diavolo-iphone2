<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ディアボロ">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>ディアボロの大冒険</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
      touch-action: none;
    }

    #app, #game-wrap {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas#c0 {
      display: block !important;
      position: static !important;
      width: min(100vw, 100dvh) !important;
      height: min(100vw, 100dvh) !important;
      max-width: none !important;
      max-height: none !important;
      margin: 0 !important;
      padding: 0 !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #pad, #extra, #reset_data, #debug_data, #bgmlink {
      display: none !important;
    }

    #bgm {
      position: fixed !important;
      left: 0 !important;
      bottom: 0 !important;
      width: 2px !important;
      height: 2px !important;
      opacity: 0.01 !important;
      border: 0 !important;
      pointer-events: none !important;
      display: block !important;
    }

    #audio-start {
      position: fixed;
      inset: 0;
      z-index: 9999;
      width: 100%;
      height: 100%;
      border: 0;
      background: rgba(0,0,0,.56);
      color: #fff;
      font: 700 18px sans-serif;
    }
  </style>
</head>
<body>
  <button id="audio-start" type="button">タップしてBGMを有効化</button>
  <main id="app">
    <div id="game-wrap">
      <canvas id="c0"></canvas>
    </div>

    <div id="pad">
      <button id="83">S/射撃</button>
      <button id="67">C/方向</button>
      <button id="88">X/キャンセル</button>
      <button id="32">Sp/地図</button>
      <button id="65">A/メニュー</button>
      <button id="90">Z/攻撃/選択</button>
      <button id="XH" hidden>X(Hold)</button>

      <div id="extra">
        BGMのYouTubeリンク（広告と音量に注意）：
        <iframe id="bgm" width="2" height="2" src="" frameborder="0" allow="autoplay; encrypted-media" playsinline></iframe>
        <a id="bgmlink" href="" target="_blank" rel="noopener">YouTube</a>
      </div>

      <button id="reset_data">データ消去</button>
      <button id="debug_data">デバッグ：攻略済みにする</button>
    </div>
  </main>

  <script src="classes.js"></script>
  <script src="adapter.js"></script>
  <script src="controller.js"></script>
  <script src="func0.js"></script>
  <script src="func1.js"></script>
  <script src="func2.js"></script>
  <script src="func3.js"></script>
  <script src="func4.js"></script>
  <script src="func5.js"></script>
  <script src="func6.js"></script>
  <script src="func7.js"></script>
  <script src="func8.js"></script>
  <script src="func9.js"></script>
  <script src="main.js"></script>

  <script>
    (function () {
      const start = document.getElementById("audio-start");
      const iframe = document.getElementById("bgm");

      if (iframe && iframe.parentElement !== document.body) {
        document.body.appendChild(iframe);
      }

      function requestPlay() {
        if (!iframe) return;
        try {
          iframe.contentWindow.postMessage(
            JSON.stringify({ event: "command", func: "playVideo", args: [] }),
            "*"
          );
        } catch (_) {}
      }

      start.addEventListener("click", function () {
        start.remove();
        requestPlay();
        setTimeout(requestPlay, 500);
        setTimeout(requestPlay, 1200);
      }, { once: true });
    })();
  </script>

</body>
</html>

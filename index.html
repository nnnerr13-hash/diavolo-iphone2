  width: 95vw;

  height: auto;

  user-select: none;

  display: block;

}

#reset_data {

  font-size: 8px;

  width: 110px;

  height: 18px;

}

#debug_data {

  font-size: 8px;

  width: 150px;

  height: 18px;

}

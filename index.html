<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background-color: orchid;
    }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: auto;
      max-width: 100vw;
      user-select: none;
      -webkit-user-select: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #pad {
      position: static;
      width: 100vw;
      padding: 6px 0 12px;
    }

    #buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 2px;
      width: 100%;
    }

    button {
      width: 100%;
      min-width: 0;
      height: 38px;
      padding: 0 2px;
      font-size: 15px;
      touch-action: manipulation;
    }

    #XH {
      display: none;
    }

    #extra {
      margin-top: 26px;
      font-size: 14px;
    }

    #reset_data {
      width: 32%;
      height: 22px;
      font-size: 8px;
    }

    #debug_data {
      width: 45%;
      height: 22px;
      font-size: 8px;
    }

    @media screen and (orientation: landscape) {
      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        padding:
          env(safe-area-inset-top, 0px)
          env(safe-area-inset-right, 0px)
          env(safe-area-inset-bottom, 0px)
          env(safe-area-inset-left, 0px);
      }

      canvas {
        width: auto;
        height: min(
          calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)),
          72vw
        );
        max-width: 72vw;
        max-height: calc(
          100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)
        );
        flex: 0 0 auto;
      }

      #pad {
        width: 28vw;
        height: calc(
          100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)
        );
        padding: 4px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      #buttons {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 3px;
      }

      button {
        height: 42px;
        font-size: 12px;
      }

      #extra {
        margin-top: 10px;
        font-size: 9px;
        line-height: 1.2;
      }

      #extra iframe {
        width: 42px;
        height: 24px;
      }

      #reset_data,
      #debug_data {
        display: block;
        width: 100%;
        height: 24px;
        margin-top: 3px;
      }
    }
  </style>
</head>

<body>
  <canvas id="c0"></canvas>

  <div id="pad">
    <div id="buttons">
      <button id="83">S/射撃</button>
      <button id="67">C/方向</button>
      <button id="88">X/キャンセル</button>
      <button id="32">Sp/地図</button>
      <button id="65">A/メニュー</button>
      <button id="90">Z/攻撃/選択</button>
    </div>

    <button id="XH" hidden>X(Hold)</button>

    <div id="extra">
      BGMのYoutubeリンク（広告と音量に注意）：
      <iframe id="bgm" width="48" height="27" src="" frameborder="0"></iframe>
      <a id="bgmlink" href="" target="_blank">Youtube</a>
      <br>
      <button id="reset_data">データ消去</button>
      <button id="debug_data">デバッグ:攻略済みにする</button>
    </div>
  </div>

  <script src="classes.js"></script>
  <script src="adapter.js"></script>
  <script src="func0.js"></script>
  <script src="func1.js"></script>
  <script src="func2.js"></script>
  <script src="func3.js"></script>
  <script src="func4.js"></script>
  <script src="func5.js"></script>
  <script src="func6.js"></script>
  <script src="func7.js"></script>
  <script src="func8.js"></script>
  <script src="func9.js"></script>
  <script src="main.js"></script>
</body>
</html>

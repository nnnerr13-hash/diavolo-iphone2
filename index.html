<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>

html,

body {

  margin: 0;

  padding: 0;

  background-color: orchid;

}

body {

  min-height: 100vh;

}

#game-area {

  display: flex;

  flex-direction: column;

  align-items: flex-start;

}

canvas {

  display: block;

  width: 95vw;

  height: auto;

  max-width: 95vw;

  user-select: none;

  -webkit-user-select: none;

  image-rendering: pixelated;

}

#pad {

  width: 95vw;

  position: static;

}

#buttons {

  display: grid;

  grid-template-columns: repeat(3, 1fr);

  width: 100%;

}

button {

  width: 100%;

  height: 38px;

  font-size: 16px;

}

#extra {

  margin-top: 35px;

}

#reset_data {

  width: 32%;

  height: 20px;

  font-size: 8px;

}

#debug_data {

  width: 45%;

  height: 20px;

  font-size: 8px;

}

/* iPhoneを横向きにした時 */

@media screen and (orientation: landscape) {

  body {

    overflow: hidden;

  }

  #game-area {

    height: 100vh;

    flex-direction: row;

    align-items: flex-start;

  }

  canvas {

    width: auto;

    height: 100vh;

    max-width: 72vw;

    max-height: 100vh;

    flex-shrink: 0;

  }

  #pad {

    width: 28vw;

    height: 100vh;

    padding: 4px;

    box-sizing: border-box;

    overflow-y: auto;

  }

  #buttons {

    grid-template-columns: 1fr 1fr;

    gap: 3px;

  }

  button {

    height: 44px;

    font-size: 13px;

  }

  #extra {

    margin-top: 12px;

    font-size: 10px;

  }

  #reset_data,

  #debug_data {

    width: 100%;

    height: 24px;

    margin-top: 3px;

  }

}

</style>

</head>

<body>

<div id="game-area">

  <canvas id="c0"></canvas>

  <div id="pad">

    <div id="buttons">

      <button id="83">S/射撃</button>

      <button id="67">C/方向</button>

      <button id="88">X/キャンセル</button>

      <button id="32">Sp/地図</button>

      <button id="65">A/メニュー</button>

      <button id="90">Z/攻撃/選択</button>

    </div>

    <button id="XH" hidden>X(Hold)</button>

    <div id="extra">

      BGMのYoutubeリンク（広告と音量に注意）：

      <iframe

        id="bgm"

        width="48"

        height="27"

        src=""

        frameborder="0">

      </iframe>

      <a id="bgmlink" href="" target="_blank">Youtube</a>

      <br>

      <button id="reset_data">データ消去</button>

      <button id="debug_data">デバッグ:攻略済みにする</button>

    </div>

  </div>

</div>

<script src="classes.js"></script>

<script src="adapter.js"></script>

<script src="func0.js"></script>

<script src="func1.js"></script>

<script src="func2.js"></script>

<script src="func3.js"></script>

<script src="func4.js"></script>

<script src="func5.js"></script>

<script src="func6.js"></script>

<script src="func7.js"></script>

<script src="func8.js"></script>

<script src="func9.js"></script>

<script src="main.js"></script>

</body>

</html>

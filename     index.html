<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>ディアボロの大冒険</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
    }

    #game-wrap {
      width: 100%;
      margin: 0 auto;
    }

    canvas#c0 {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100vw;
      margin: 0 auto;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #pad {
      position: static;
      width: 100%;
      margin: 0;
      padding: 8px 6px 12px;
      background: #111;
      text-align: center;
    }

    #main-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      width: 100%;
    }

    button {
      min-width: 0;
      min-height: 48px;
      margin: 0;
      padding: 6px 2px;
      border: 1px solid #777;
      border-radius: 12px;
      background: #f2f2f2;
      color: #111;
      font: 600 15px/1.2 -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.97);
      background: #d8d8d8;
    }

    #XH {
      width: 100%;
      margin-top: 6px;
    }

    #extras {
      margin-top: 10px;
      font: 12px/1.5 -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    }

    #bgm {
      vertical-align: middle;
    }

    #data-buttons {
      display: grid;
      grid-template-columns: 2fr 3fr;
      gap: 6px;
      margin-top: 8px;
    }

    #reset_data,
    #debug_data {
      width: 100%;
      min-height: 36px;
      font-size: 11px;
    }

    @media (orientation: landscape) {
      body {
        overflow: hidden;
      }

      #game-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 38vw);
        align-items: center;
        min-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      }

      canvas#c0 {
        width: auto;
        max-width: 62vw;
        max-height: 100dvh;
      }

      #pad {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 10px;
      }

      #main-buttons {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <main id="game-wrap">
    <canvas id="c0"></canvas>

    <div id="pad">
      <div id="main-buttons">
        <button id="83">S/射撃</button>
        <button id="67">C/方向</button>
        <button id="88">X/キャンセル</button>
        <button id="32">Sp/地図</button>
        <button id="65">A/メニュー</button>
        <button id="90">Z/攻撃/選択</button>
      </div>

      <button id="XH" hidden>X(Hold)</button>

      <div id="extras">
        <div>
          BGMのYouTubeリンク（広告と音量に注意）：
          <iframe id="bgm" width="48" height="27" src="" frameborder="0"></iframe>
          <a id="bgmlink" href="" target="_blank" rel="noopener">YouTube</a>
        </div>

        <div id="data-buttons">
          <button id="reset_data">データ消去</button>
          <button id="debug_data">デバッグ：攻略済みにする</button>
        </div>
      </div>
    </div>
  </main>

  <script src="classes.js"></script>
  <script src="adapter.js"></script>
  <script src="func0.js"></script>
  <script src="func1.js"></script>
  <script src="func2.js"></script>
  <script src="func3.js"></script>
  <script src="func4.js"></script>
  <script src="func5.js"></script>
  <script src="func6.js"></script>
  <script src="func7.js"></script>
  <script src="func8.js"></script>
  <script src="func9.js"></script>
  <script src="main.js"></script>
</body>
</html>
